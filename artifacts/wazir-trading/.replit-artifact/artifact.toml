kind = "web"
previewPath = "/"
title = "Wazir Trading LLC"
version = "1.0.0"
id = "artifacts/wazir-trading"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24102

[services.development]
run = "pnpm --filter @workspace/wazir-trading run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wazir-trading", "run", "build" ]
serve = "static"
publicDir = "artifacts/wazir-trading/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24102"
BASE_PATH = "/"
